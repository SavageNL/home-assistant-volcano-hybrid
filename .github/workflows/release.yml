name: Publish Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build a release for"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the tag
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Resolve version from tag
        id: version
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if [[ "$version" == *-alpha* || "$version" == *-beta* || "$version" == *-rc* ]]; then
            echo "prerelease=--prerelease" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=" >> "$GITHUB_OUTPUT"
          fi

      - name: Stamp version into manifest and build zip
        run: |
          manifest="custom_components/volcano_hybrid/manifest.json"
          tmp="$(mktemp)"
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' "$manifest" > "$tmp"
          mv "$tmp" "$manifest"
          cd custom_components/volcano_hybrid
          zip -r "$GITHUB_WORKSPACE/volcano_hybrid.zip" . -x '*__pycache__*' '*.pyc'

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "$GITHUB_WORKSPACE/volcano_hybrid.zip" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes \
            ${{ steps.version.outputs.prerelease }}
